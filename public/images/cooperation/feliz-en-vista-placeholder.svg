<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800" role="img" aria-label="Ảnh phối cảnh Feliz en Vista — cập nhật sau">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7f4b0d"/>
      <stop offset="1" stop-color="#4f2f08"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.15" r="0.6">
      <stop offset="0" stop-color="#fdcd04" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#fdcd04" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect width="1200" height="800" fill="url(#glow)"/>
  <!-- silhouette các tòa tháp -->
  <g fill="#ffffff" fill-opacity="0.07">
    <rect x="200" y="430" width="140" height="370"/>
    <rect x="370" y="330" width="160" height="470"/>
    <rect x="560" y="410" width="160" height="390"/>
    <rect x="750" y="350" width="150" height="450"/>
  </g>
  <g fill="#fdcd04" fill-opacity="0.5">
    <circle cx="72" cy="150" r="7"/>
    <circle cx="1128" cy="650" r="7"/>
  </g>
  <text x="600" y="360" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="80" font-weight="700" fill="#ffffff">Feliz en Vista</text>
  <text x="600" y="430" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="30" fill="#ffffff" fill-opacity="0.75">Quận 2, TP.HCM · CapitaLand</text>
  <text x="600" y="512" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" letter-spacing="6" fill="#fdcd04">PHỐI CẢNH DỰ ÁN — ẢNH CẬP NHẬT SAU</text>
</svg>
